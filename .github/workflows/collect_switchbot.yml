name: Collect SwitchBot Data

on:
  workflow_dispatch:  # cron-job.org から10分毎に叩かれる

concurrency:
  group: collect-switchbot
  cancel-in-progress: false  # 実行中のジョブは完走させる

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: sb-data-accumulator/requirements.txt

      - name: Install dependencies
        run: pip install -r sb-data-accumulator/requirements.txt

      - name: Run collector
        env:
          SB_API_TOKEN:      ${{ secrets.SB_API_TOKEN }}
          SB_API_SECRET:     ${{ secrets.SB_API_SECRET }}
          DEVICE_IDS:        ${{ secrets.DEVICE_IDS }}
          DEVICE_NAMES:      ${{ secrets.DEVICE_NAMES }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python sb-data-accumulator/collector.py
