name: Aggregate Power Data (Daily)

on:
  schedule:
    - cron: '0 16 * * *'  # 毎日01:00 JST（16:00 UTC）
  workflow_dispatch:        # GitHub画面から手動実行も可能

jobs:
  aggregate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: sb-data-accumulator/requirements.txt

      - name: Install dependencies
        run: pip install -r sb-data-accumulator/requirements.txt

      - name: Run aggregator
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python sb-data-accumulator/aggregator.py
