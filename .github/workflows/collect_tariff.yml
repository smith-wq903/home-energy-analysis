name: Collect Tariff Data

on:
  schedule:
    - cron: '0 1 15 * *'  # 毎月15日 10:00 JST（UTC 01:00）
  workflow_dispatch:        # 手動実行も可能

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: sb-data-accumulator/requirements.txt

      - name: Install dependencies
        run: pip install httpx beautifulsoup4 lxml

      - name: Run tariff collector
        run: python sb-data-accumulator/tariff_collector.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add power-dashboard/tariff_data.csv
          git diff --staged --quiet || git commit -m "chore: 料金単価データ自動更新 $(date +'%Y年%m月')"
          git push
