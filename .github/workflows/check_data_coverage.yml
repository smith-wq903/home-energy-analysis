name: Check Data Coverage (one-time)

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install supabase python-dotenv
      - name: Query coverage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 - <<'EOF'
          import os
          from datetime import datetime, timedelta, timezone
          from supabase import create_client

          supabase = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_SERVICE_ROLE_KEY"])
          JST = timezone(timedelta(hours=9))
          now = datetime.now(JST)
          week_ago = now - timedelta(days=7)

          # 総レコード数
          result = supabase.table("device_power") \
              .select("recorded_at, device_name", count="exact") \
              .gte("recorded_at", week_ago.isoformat()) \
              .execute()
          total = result.count
          print(f"直近7日間の総レコード数: {total} 件")

          # デバイス別件数
          result2 = supabase.table("device_power") \
              .select("device_name, recorded_at") \
              .gte("recorded_at", week_ago.isoformat()) \
              .order("recorded_at") \
              .limit(100000) \
              .execute()

          from collections import Counter
          by_device = Counter(r["device_name"] for r in result2.data)
          print("\nデバイス別件数:")
          for name, cnt in sorted(by_device.items(), key=lambda x: -x[1]):
              print(f"  {name}: {cnt} 件")

          # 日別件数（JST）
          from collections import defaultdict
          by_day = defaultdict(int)
          for r in result2.data:
              dt = datetime.fromisoformat(r["recorded_at"]).astimezone(JST)
              by_day[dt.strftime("%m/%d")] += 1
          print("\n日別レコード数（JST）:")
          for day in sorted(by_day):
              print(f"  {day}: {by_day[day]} 件")

          # タイムスタンプの間隔を分析（ペンペンのみ）
          penpen = [r for r in result2.data if r["device_name"] == "ペンペン"]
          times = sorted(datetime.fromisoformat(r["recorded_at"]) for r in penpen)
          gaps = [(times[i+1]-times[i]).total_seconds()/3600 for i in range(len(times)-1)]
          big_gaps = [(times[i], times[i+1], g) for i, g in enumerate(gaps) if g > 1]
          print(f"\n1時間超の欠損ギャップ ({len(big_gaps)}件):")
          for start, end, g in big_gaps:
              start_jst = start.astimezone(JST)
              end_jst = end.astimezone(JST)
              print(f"  {start_jst.strftime('%m/%d %H:%M')} 〜 {end_jst.strftime('%m/%d %H:%M')} ({g:.1f}h)")
          EOF
