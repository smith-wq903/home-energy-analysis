name: Check Data Coverage (one-time)

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install supabase python-dotenv
      - name: Query coverage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 - <<'EOF'
          import os
          from datetime import datetime, timedelta, timezone
          from supabase import create_client

          supabase = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_SERVICE_ROLE_KEY"])
          JST = timezone(timedelta(hours=9))
          now = datetime.now(JST)
          week_ago = now - timedelta(days=7)

          # device_power (生データ)
          r1 = supabase.table("device_power") \
              .select("recorded_at", count="exact") \
              .gte("recorded_at", week_ago.isoformat()) \
              .execute()
          print(f"[device_power] 直近7日間: {r1.count} 件")

          r1b = supabase.table("device_power") \
              .select("recorded_at", count="exact") \
              .execute()
          print(f"[device_power] 全期間合計: {r1b.count} 件")

          oldest = supabase.table("device_power") \
              .select("recorded_at") \
              .order("recorded_at", desc=False) \
              .limit(1) \
              .execute()
          newest = supabase.table("device_power") \
              .select("recorded_at") \
              .order("recorded_at", desc=True) \
              .limit(1) \
              .execute()
          if oldest.data:
              print(f"[device_power] 最古: {oldest.data[0]['recorded_at']}")
              print(f"[device_power] 最新: {newest.data[0]['recorded_at']}")

          # device_power_30min (集約データ)
          r2 = supabase.table("device_power_30min") \
              .select("recorded_at", count="exact") \
              .execute()
          print(f"\n[device_power_30min] 全期間合計: {r2.count} 件")

          if r2.count > 0:
              oldest2 = supabase.table("device_power_30min") \
                  .select("recorded_at") \
                  .order("recorded_at", desc=False) \
                  .limit(1) \
                  .execute()
              newest2 = supabase.table("device_power_30min") \
                  .select("recorded_at", desc=True) \
                  .order("recorded_at") \
                  .limit(1) \
                  .execute()
              print(f"[device_power_30min] 最古: {oldest2.data[0]['recorded_at']}")
              print(f"[device_power_30min] 最新: {newest2.data[0]['recorded_at']}")
          else:
              print("[device_power_30min] データなし")
          EOF
